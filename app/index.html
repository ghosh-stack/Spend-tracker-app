<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- Defense-in-depth: same-origin only. Enforces the "no third-party calls"
       privacy guarantee and neutralizes any future XSS regression. style-src
       allows 'unsafe-inline' because the UI uses inline style attributes. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'" />
  <title>SpendLens — live expense tracker</title>
  <meta name="description" content="Local-first expense tracker that turns bank UPI & card notifications into a live, categorized dashboard." />
  <meta name="theme-color" content="#0b1014" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="shell" id="shell">
    <aside class="rail" aria-label="Primary navigation">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">₹</span>
        <span class="brand-name">SpendLens</span>
      </div>
      <nav class="nav" id="nav">
        <p class="nav-section">Overview</p>
        <button class="nav-item" data-view="overview" aria-current="page">
          <span class="nav-ico" aria-hidden="true">◧</span> Dashboard
        </button>
        <button class="nav-item" data-view="transactions">
          <span class="nav-ico" aria-hidden="true">≣</span> Transactions
        </button>
        <button class="nav-item" data-view="recurring">
          <span class="nav-ico" aria-hidden="true">🔁</span> Recurring
        </button>
        <button class="nav-item" data-view="insights">
          <span class="nav-ico" aria-hidden="true">📊</span> Insights
        </button>
        <button class="nav-item" data-view="unparsed">
          <span class="nav-ico" aria-hidden="true">⚠</span> Needs review
          <span class="badge" id="unparsedBadge" hidden>0</span>
        </button>
        <p class="nav-section">Data</p>
        <button class="nav-item" data-action="import"><span class="nav-ico" aria-hidden="true">⤓</span> Import file</button>
        <button class="nav-item" data-action="sample"><span class="nav-ico" aria-hidden="true">✦</span> Load demo data</button>
      </nav>
      <div class="rail-foot">
        <button class="nav-item" data-action="export"><span class="nav-ico" aria-hidden="true">⤒</span> Export</button>
        <button class="nav-item danger" data-action="erase"><span class="nav-ico" aria-hidden="true">⌫</span> Erase all</button>
      </div>
    </aside>

    <header class="topbar">
      <div class="topbar-titles">
        <h1 id="viewTitle">Overview</h1>
        <p class="context" id="contextLine">—</p>
      </div>
      <div class="topbar-actions">
        <span class="live" id="livePill" title="Live ingestion status">
          <span class="live-dot"></span><span id="liveText">Offline</span>
        </span>
        <button class="btn ghost icon" id="themeToggle" aria-label="Toggle dark / light theme" title="Toggle theme">◐</button>
        <button class="btn ghost" data-action="paste">Paste alert</button>
        <button class="btn primary" data-action="add">+ Add expense</button>
      </div>
    </header>

    <main class="main" id="main">
      <section class="filters" id="filters" role="group" aria-label="Filters"></section>
      <section class="kpis" id="kpis" aria-label="Summary"></section>
      <section class="charts" id="charts"></section>
      <section id="feedCard"></section>
    </main>

    <nav class="bottomnav" aria-label="Primary">
      <button class="bn-item" data-view="overview" aria-current="page"><span aria-hidden="true">◧</span><b>Home</b></button>
      <button class="bn-item" data-view="transactions"><span aria-hidden="true">≣</span><b>Txns</b></button>
      <button class="bn-fab" data-action="add" aria-label="Add expense">+</button>
      <button class="bn-item" data-view="recurring"><span aria-hidden="true">🔁</span><b>Recurring</b></button>
      <button class="bn-item" data-action="menu"><span aria-hidden="true">⋯</span><b>More</b></button>
    </nav>
  </div>

  <dialog id="modal" class="modal"></dialog>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <input type="file" id="fileInput" accept=".json,.csv,.txt" hidden />

  <script type="module" src="js/app.js"></script>
</body>
</html>
