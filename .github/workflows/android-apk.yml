name: Android APK (sideload)

# Build an installable APK for sideloading. Run it manually (Actions tab →
# "Run workflow") or by pushing a v* tag. The sandbox can't compile/sign — THIS
# workflow is the build; download the artifact and sideload it to your phone.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write   # to attach the APK to a Release on tag builds

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'          # AGP 8 / Capacitor 6 need JDK 17

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3   # cmdline-tools + license acceptance

      # Install wrapper deps, generate the android/ project, copy the PWA from
      # ../app, inject the native capture code, and patch the manifest.
      - run: npm install
      - run: npx cap add android

      # On tag builds, stamp the running version into the web bundle (read by the
      # in-app updater) from the tag — e.g. v0.2.0 → '0.2.0'. Must precede cap sync,
      # which copies ../app into the android project. Manual builds keep '0.0.0-dev'.
      - name: Stamp app version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VER="${GITHUB_REF_NAME#v}"
          {
            echo "// Stamped by CI from the release tag.";
            echo "export const APP_VERSION = '${VER}';";
            echo "export const REPO = 'ghosh-stack/Spend-tracker-app';";
          } > ../app/js/version.js
          cat ../app/js/version.js

      - run: npx cap sync android
      - run: node scripts/apply-native.mjs

      # Use a committed, STABLE debug keystore so every build is signed with the SAME
      # key. Otherwise each CI run auto-generates a random debug key, and a new APK
      # won't install over the previous one ("App not installed" / signature mismatch).
      # These are Android's universal debug creds (androiddebugkey / "android") — not
      # secret by design — so committing the keystore is safe for a sideloaded app.
      - name: Use the stable debug keystore
        run: |
          mkdir -p ~/.android
          cp keystore/debug.keystore ~/.android/debug.keystore

      # Debug-signed APK (signed with the stable keystore above). Installs via
      # "unknown sources"; not a Play-eligible artifact.
      - name: Build debug APK
        working-directory: android-native/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: spendlens-debug-apk
          path: android-native/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK to the Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-native/android/app/build/outputs/apk/debug/app-debug.apk
